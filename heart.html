<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trái tim của anh khi có em</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Montserrat:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0f12;
            color: #d8d8d8;
            font-family: 'Cormorant Garamond', serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .ambient-glow {
            position: absolute;
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, rgba(166, 73, 90, 0.12) 0%, rgba(13, 15, 18, 0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: breathe 8s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes breathe {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.5;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s 0.5s forwards ease-in-out;
            padding: 40px;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .heart-svg {
            width: 50px;
            height: 50px;
            margin: 0 auto 30px;
            fill: none;
            stroke: #a6495a;
            stroke-width: 1;
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            animation: drawHeart 3s forwards ease-in-out, pulseStroke 4s infinite alternate ease-in-out 3s;
        }

        @keyframes drawHeart {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes pulseStroke {
            0% {
                filter: drop-shadow(0 0 2px rgba(166, 73, 90, 0.2));
                stroke-width: 1;
            }

            100% {
                filter: drop-shadow(0 0 12px rgba(166, 73, 90, 0.6));
                stroke-width: 1.2;
            }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
            line-height: 1.4;
            color: #f0f0f0;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            color: #7a7a7c;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .back-link {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: #a1a1a3;
            text-decoration: none;
            text-transform: uppercase;
            position: relative;
            padding-bottom: 8px;
            transition: color 0.4s ease;
        }

        .back-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: #a6495a;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .back-link:hover {
            color: #fff;
        }

        .back-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
    </style>
</head>

<body>
    <div class="ambient-glow"></div>
    <div class="container">
        <svg class="heart-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
        </svg>
        <h1>Trái tim của anh khi có em</h1>
        <div class="subtitle">Bình yên & Trọn vẹn</div>
        <a href="index.html" class="back-link">Quay lại</a>
    </div>
</body>

</html>
