<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điều anh thích</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Montserrat:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0f12;
            color: #d8d8d8;
            font-family: 'Cormorant Garamond', serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .ambient-glow {
            position: absolute;
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, rgba(144, 238, 144, 0.08) 0%, rgba(13, 15, 18, 0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: breathe 8s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes breathe {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0.5;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s 0.5s forwards ease-in-out;
            padding: 40px;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* A leaf/nature icon */
        .icon-svg {
            width: 44px;
            height: 44px;
            margin: 0 auto 30px;
            fill: none;
            stroke: #90ee90;
            stroke-width: 1;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawIcon 2s forwards ease-in-out, floatIcon 4s infinite alternate ease-in-out 2s;
        }

        @keyframes drawIcon {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes floatIcon {
            0% {
                transform: translateY(0);
                filter: drop-shadow(0 0 2px rgba(144, 238, 144, 0.2));
            }

            100% {
                transform: translateY(-5px);
                filter: drop-shadow(0 0 10px rgba(144, 238, 144, 0.4));
                stroke-width: 1.2;
            }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
            color: #f0f0f0;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            color: #7a7a7c;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .back-link {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: #a1a1a3;
            text-decoration: none;
            text-transform: uppercase;
            position: relative;
            padding-bottom: 8px;
            transition: color 0.4s ease;
        }

        .back-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: #90ee90;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .back-link:hover {
            color: #fff;
        }

        .back-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
    </style>
</head>

<body>
    <div class="ambient-glow"></div>
    <div class="container">
        <svg class="icon-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"
                stroke-linejoin="round" stroke-linecap="round" />
        </svg>
        <h1>Điều anh thích</h1>
        <div class="subtitle">Chính là em</div>
        <a href="index.html" class="back-link">Quay lại</a>
    </div>
</body>

</html>
